name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0-alpha.1"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify_tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.gate.outputs.tag }}
      commit: ${{ steps.gate.outputs.commit }}
      tag_object: ${{ steps.gate.outputs.tag_object }}
      verification: ${{ steps.gate.outputs.verification }}
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v6.0.3

      - name: Verify selected ref and release tag
        id: gate
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          expected_commit=$(git rev-parse HEAD)
          bash .github/scripts/verify-release-tag.sh "${RELEASE_TAG}" "${expected_commit}"

  test:
    name: Test
    needs: verify_tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ needs.verify_tag.outputs.commit }}

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  test-windows:
    name: Test and route integration (Windows)
    needs: verify_tag
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ needs.verify_tag.outputs.commit }}

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify elevated runner
        shell: pwsh
        run: |
          $principal = New-Object Security.Principal.WindowsPrincipal([Security.Principal.WindowsIdentity]::GetCurrent())
          if (-not $principal.IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)) {
            throw "Windows release route integrations require an elevated runner"
          }

      - name: Test full Windows suite
        run: go test ./...

      - name: Test protected HKLM journal and mutex integration
        shell: pwsh
        run: go test -tags=routejournalintegration ./internal/tun -run '^TestWindowsRouteJournal(RegistryIntegration|InitializesSecretFromProtectedEmptyHKLMKey|MachineMutexMultiProcess|MachineMutexTimeoutAndAbandonment)$' -count=1 -v

      - name: Test real route recovery and rollback
        shell: pwsh
        env:
          TACHYON_ALLOW_REAL_ROUTE_TEST: "1"
        run: go test -tags=routeintegration ./internal/tun -run '^TestWindowsRouteJournal(AbandonedPendingRealChildRecovery|RecordFailureRealRouteRollback)$' -count=1 -v

  build:
    name: Build ${{ matrix.asset_os }}-${{ matrix.asset_arch }}
    needs: [verify_tag, test, test-windows]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            asset_os: windows
            asset_arch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            asset_os: windows
            asset_arch: arm64
            ext: ".exe"
          - goos: darwin
            goarch: amd64
            asset_os: darwin
            asset_arch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            asset_os: darwin
            asset_arch: arm64
            ext: ""
          - goos: linux
            goarch: amd64
            asset_os: linux
            asset_arch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            asset_os: linux
            asset_arch: arm64
            ext: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ needs.verify_tag.outputs.commit }}

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version metadata
        id: meta
        shell: bash
        env:
          VERIFIED_TAG: ${{ needs.verify_tag.outputs.tag }}
          VERIFIED_COMMIT: ${{ needs.verify_tag.outputs.commit }}
        run: |
          set -euo pipefail
          source_date_epoch=$(git show -s --format=%ct "${VERIFIED_COMMIT}")
          build_time=$(date -u --date="@${source_date_epoch}" +%Y-%m-%dT%H:%M:%SZ)
          echo "version=${VERIFIED_TAG}" >> "${GITHUB_OUTPUT}"
          echo "source_date_epoch=${source_date_epoch}" >> "${GITHUB_OUTPUT}"
          echo "build_time=${build_time}" >> "${GITHUB_OUTPUT}"
          echo "go_version=$(go version | awk '{print $3}')" >> "${GITHUB_OUTPUT}"

      - name: Build binaries
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.meta.outputs.version }}
          BUILD_TIME: ${{ steps.meta.outputs.build_time }}
          GO_VERSION: ${{ steps.meta.outputs.go_version }}
          SOURCE_DATE_EPOCH: ${{ steps.meta.outputs.source_date_epoch }}
          EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail
          mkdir -p build
          ldflags="-s -w -X main.Version=${VERSION} -X main.BuildTime=${BUILD_TIME} -X main.GoVersion=${GO_VERSION}"
          go build -trimpath -ldflags "${ldflags}" -o "build/tachyon-core${EXT}" ./cmd/tachyon-core
          go build -trimpath -ldflags "${ldflags}" -o "build/tachyonctl${EXT}" ./cmd/tachyonctl
          touch --date="@${SOURCE_DATE_EPOCH}" "build/tachyon-core${EXT}" "build/tachyonctl${EXT}"

      - name: Package
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          ASSET_OS: ${{ matrix.asset_os }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
          SOURCE_DATE_EPOCH: ${{ steps.meta.outputs.source_date_epoch }}
        run: |
          set -euo pipefail
          asset="tachyon-core_${VERSION}_${ASSET_OS}_${ASSET_ARCH}.zip"
          cp README.md README.zh-CN.md build/
          touch --date="@${SOURCE_DATE_EPOCH}" build/*
          (cd build && TZ=UTC zip -X -9 "../${asset}" ./*)
          mkdir -p dist
          mv "${asset}" dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: tachyon-core-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [verify_tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ needs.verify_tag.outputs.commit }}

      - name: Download artifacts
        uses: actions/download-artifact@v7.0.0
        with:
          path: artifacts

      - name: Prepare release assets
        id: meta
        shell: bash
        env:
          VERIFIED_TAG: ${{ needs.verify_tag.outputs.tag }}
          VERIFIED_COMMIT: ${{ needs.verify_tag.outputs.commit }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            prerelease="${{ inputs.prerelease }}"
          else
            prerelease="true"
          fi
          version="${VERIFIED_TAG}"
          mkdir -p release
          find artifacts -name "*.zip" -type f -exec cp {} release/ \;
          bash .github/scripts/prepare-release.sh "${version}" "${VERIFIED_COMMIT}" release
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Reverify release tag before publishing
        id: publish_gate
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.verify_tag.outputs.tag }}
          EXPECTED_COMMIT: ${{ needs.verify_tag.outputs.commit }}
          EXPECTED_TAG_OBJECT: ${{ needs.verify_tag.outputs.tag_object }}
        run: bash .github/scripts/verify-release-tag.sh "${RELEASE_TAG}" "${EXPECTED_COMMIT}" origin "${EXPECTED_TAG_OBJECT}"

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
          COMMIT: ${{ steps.publish_gate.outputs.commit }}
        run: |
          set -euo pipefail
          bash .github/scripts/publish-release.sh "${VERSION}" "${COMMIT}" "${PRERELEASE}" release
