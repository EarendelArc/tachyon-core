name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify release policy
        shell: bash
        run: |
          bash -n .github/scripts/verify-release-tag.sh
          bash -n .github/scripts/prepare-release.sh
          bash -n .github/scripts/publish-release.sh
          bash -n .github/scripts/test-release-policy.sh
          bash .github/scripts/test-release-policy.sh

      - name: Verify server diagnostics script
        shell: bash
        run: |
          bash -n scripts/verify-server.sh
          bash scripts/verify-server.sh --self-test

      - name: Verify opt-in TGP E2E script
        shell: bash
        run: |
          bash -n scripts/verify-tgp-e2e.sh
          bash scripts/verify-tgp-e2e.sh --self-test

      - name: Test
        run: go test ./...

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Test elevated Windows route journal integration
        shell: pwsh
        run: |
          $principal = New-Object Security.Principal.WindowsPrincipal([Security.Principal.WindowsIdentity]::GetCurrent())
          if (-not $principal.IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)) {
            throw "Windows route journal integration requires an elevated runner"
          }
          go test -tags=routejournalintegration ./internal/tun -run '^TestWindowsRouteJournal(RegistryIntegration|InitializesSecretFromProtectedEmptyHKLMKey|MachineMutexMultiProcess|MachineMutexTimeoutAndAbandonment)$' -count=1 -v

      - name: Test elevated Windows real route recovery and rollback
        shell: pwsh
        env:
          TACHYON_ALLOW_REAL_ROUTE_TEST: "1"
        run: |
          $principal = New-Object Security.Principal.WindowsPrincipal([Security.Principal.WindowsIdentity]::GetCurrent())
          if (-not $principal.IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)) {
            throw "Windows real route integration requires an elevated runner"
          }
          go test -tags=routeintegration ./internal/tun -run '^TestWindowsRouteJournal(AbandonedPendingRealChildRecovery|RecordFailureRealRouteRollback)$' -count=1 -v

      - name: Test
        run: go test ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...
